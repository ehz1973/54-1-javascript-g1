<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABP - M4</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script defer src="https://momentjs.com/downloads/moment-with-locales.js"></script>


    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css" rel="stylesheet">


    <script defer type="module" src="./assets/js/script.js"></script>


</head>

<body>

    <header class="py-3">
        <h1 class="text-center">App Task Flow</h1>
    </header>

    <main class="container">
        <section>
            <form id="form-add-tarea">
                <div class="mb-3">
                    <input type="text" class="form-control" name="descripcion" id="descripcion"
                        placeholder="Descripción nueva tarea..." required>
                </div>
                <div>
                    <button class="btn btn-primary" id="btn-crear-tarea">Agregar</button>

                    <button class="btn btn-primary d-none" type="button" disabled id="btn-spinner-tarea">
                        <span class="spinner-grow spinner-grow-sm" aria-hidden="true"></span>
                        <span role="status">Procesando solicitud...</span>
                    </button>
                </div>
            </form>
        </section>

        <section class="py-3">
            <h2 class="text-center">Lista de tareas</h2>
            <div>
                <p id="texto-sin-tareas" class="text-center">** SIN TAREAS **</p>
                <table class="table d-none" id="tabla-tareas">
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Descripción</th>
                            <th scope="col">Estado</th>
                            <th scope="col">Fecha Creación</th>
                            <th scope="col">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla-tareas">
                        <!-- AQUÍ SE AGREGAN LAS TAREAS DE FORMA DINÁMICA. -->
                    </tbody>
                </table>

            </div>
        </section>
    </main>

</body>

</html>
