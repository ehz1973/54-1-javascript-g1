<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Práctico L1 - L2</title>


    <link rel="stylesheet" href="./assets/css/style.css">

    <script defer type="module" src="./assets/js/script.js"></script>
</head>

<body>

    <section id="calcular-valores">
        <div>
            <label for="valor1">Valor 1</label>
            <input type="number" name="valor1" id="valor1" value="0">
        </div>
        <div>
            <label for="valor2">Valor 2</label>
            <input type="number" name="valor2" id="valor2" value="0">
        </div>
        <div>
            <select name="operacion" id="operacion">
                <option value="sumar">Sumar</option>
                <option value="restar">Restar</option>
                <option value="multiplicar">Multiplicar</option>
            </select>
        </div>

        <div>
            <button id="btn-calcular">Calcular</button>
        </div>

        <div>
            <p>Resultado: <span id="resultado"></span></p>
        </div>
    </section>

</body>

</html>
