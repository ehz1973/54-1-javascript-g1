<script>
    //CALCULAR EL ÁREA DE UN CIRCULO
    // FORMÚLA: area = pi * radio^2

    let radio = prompt("Ingresa tu radio (cm):");

    radio = Number(radio);

    const PI = 3.1416;

    let area = PI * (radio * radio);

    alert("El área del círculo es: " + area.toFixed(2) + "cms2");

</script>
