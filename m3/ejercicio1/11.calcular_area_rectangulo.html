<script>
    //CALCULAR EL ÁREA DE UN RECTANGULO

    let altura = prompt("Ingresa tu altura (cm):");
    let base = prompt("Ingresa tu base (cm):");

    altura = Number(altura);
    base = Number(base);

    let area = base * altura;

    alert("El área del rectangulo es: " + area.toFixed(2) + " cm²");


</script>
